<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Caption Generator</title>
    <script>
      if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    </script>
    <link href="/static/dist/main.css" rel="stylesheet">
    <link href="/static/assets/favicon.svg" rel="icon" type="svg+xml">
    <style>
      html { color-scheme: light; }
      html.dark { color-scheme: dark; }
    </style>
  </head>
  <body class="bg-zinc-50 dark:bg-zinc-950 min-h-screen flex flex-col items-center p-4 pt-12 font-sans text-zinc-900 dark:text-zinc-100">
    
    <div class="w-full max-w-md bg-white dark:bg-zinc-900 rounded-3xl shadow-sm border border-zinc-200 dark:border-zinc-700 p-8 space-y-10">
      
      <div class="flex flex-col items-center justify-center space-y-4 w-full">
        <button onclick="toggleDarkMode()" class="p-2 rounded-full bg-inherit hover:scale-125 focus:outline-none" aria-label="Toggle Dark Mode">
          <svg class="w-6 h-6 hidden dark:block text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
          </svg>
          <svg class="w-6 h-6 block dark:hidden text-zinc-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
          </svg>
        </button>

        <header class="text-center space-y-1">
          <h1 class="text-xl font-black tracking-tight uppercase">Caption Generator</h1>
          <div class="h-1 w-12 bg-black dark:bg-white mx-auto"></div>
        </header>
      </div>

      <div class="space-y-6">
        <p class="text-[11px] text-center font-bold uppercase tracking-widest text-zinc-900 dark:text-white">
            Please Sign In
        </p>
        
        <a href="/login/google" 
          class="w-full bg-black dark:bg-zinc-200 text-white dark:text-zinc-900 py-4 rounded-2xl font-bold hover:bg-zinc-800 dark:hover:bg-white flex items-center justify-center gap-3 transition-colors duration-200 text-xs tracking-tight">
            <svg class="w-4 h-4" viewBox="0 0 24 24">
                <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" />
                <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
            </svg>
            <span>SIGN IN WITH GOOGLE</span>
        </a>
      </div>
    </div>

    <footer class="mt-8 pb-8 text-center space-y-2">
      <p class="text-[10px] font-bold uppercase tracking-[0.2em] text-zinc-400 dark:text-zinc-500">
        &copy; 2026 Artisanal Systems. All rights reserved.
      </p>
      <p class="flex items-center justify-center text-[9px] text-zinc-400/60 dark:text-zinc-500/40 italic">
        <img src="/static/assets/favicon.svg" alt="" style="height: 20px; width: 20px; margin-right: 6px;" />
        <span>Software built from first principles.</span>
      </p>
    </footer>

    <script>
      function toggleDarkMode() {
        const isDark = document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
      }

      document.body.addEventListener('htmx:responseError', function(evt) {
          if (evt.detail.xhr.status === 401) {
              window.location.href = '/login';
          }
      });
    </script>
  </body>
</html>
