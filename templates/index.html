<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Caption Generator</title>
    <script src="https://unpkg.com/htmx.org@2.0.0"></script>
    <script src="https://unpkg.com/htmx.org/dist/ext/json-enc.js"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script shadow>
      tailwind.config = {
        darkMode: 'class',
      }
    </script>
    <style>
      .htmx-indicator {
        display: none;
      }
      .htmx-request .htmx-indicator {
        display: inline-block;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      textarea::placeholder {
        font-style: italic;
        color: #a1a1aa;
      }
    </style>
  </head>
  <body
    class="bg-zinc-50 dark:bg-zinc-950 min-h-screen flex flex-col items-center p-4 pt-12 font-sans text-zinc-900 dark:text-zinc-100"
  >
    <div
      class="w-full max-w-md bg-white dark:bg-zinc-900 rounded-3xl shadow-sm border border-zinc-200 dark:border-zinc-700 p-6 space-y-8"
    >
      <div class="flex flex-col items-center justify-center space-y-4 mb-8 w-full">
        <button 
          onclick="toggleDarkMode()" 
          class="p-2 rounded-full bg-inherit hover:scale-125 focus:outline-none"
          aria-label="Toggle Dark Mode"
        >
          <svg class="w-6 h-6 hidden dark:block text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
          </svg>
          <svg class="w-6 h-6 block dark:hidden text-zinc-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
          </svg>
        </button>

        <header class="text-center space-y-1">
          <h1 class="text-xl font-black tracking-tight uppercase">
            Caption Generator
          </h1>
          <div class="h-1 w-12 bg-black dark:bg-white mx-auto"></div>
        </header>
      </div>

      <form
        hx-post="/generate_caption"
        hx-ext="json-enc"
        hx-target="#output-window"
        hx-swap="innerHTML"
        class="space-y-6"
        novalidate
        x-data="{ tried: false }"
        @submit="
          tried = true; 
          if (!$el.checkValidity()) { 
            $event.preventDefault(); 
            const firstInvalid = $el.querySelector(':invalid');
            if (firstInvalid) {
              firstInvalid.scrollIntoView({ behavior: 'smooth', block: 'center' });
              firstInvalid.focus();
            }
            return false; 
          }
        "
      >
        <input type="hidden" name="provider" value="gemini" />
        <div x-data="{ val: '' }">
            <label 
              for="title-input" 
              class="block text-[10px] font-bold uppercase tracking-widest text-zinc-400 mb-2"
              :class="tried && !val ? 'text-rose-700 dark:text-rose-300/90' : 'text-zinc-400'"
            >
              Article Title
            </label>
            <input type="text" name="title" id="title-input" required
            class="w-full p-4 bg-zinc-50 dark:bg-zinc-950 border border-zinc-100 dark:border-zinc-800 rounded-2xl focus:ring-1 focus:ring-black dark:focus:ring-zinc-400 outline-none text-sm">
        </div>

        <div x-data="{ val: '' }">
            <label 
              for="link-input" 
              class="block text-[10px] font-bold uppercase tracking-widest text-zinc-400 mb-2"
              :class="tried && !val ? 'text-rose-700 dark:text-rose-300/90' : 'text-zinc-400'"
            >
              Article Link
            </label>
            <input type="url" name="link" id="link-input" required
            class="w-full p-4 bg-zinc-50 dark:bg-zinc-950 border border-zinc-100 dark:border-zinc-800 rounded-2xl focus:ring-1 focus:ring-black dark:focus:ring-zinc-400 outline-none text-sm">
        </div>

        <div x-data="{ val: '' }">
          <label
            for="text-input"
            class="block text-[10px] font-bold uppercase tracking-widest text-zinc-400 mb-2"
            :class="tried && !val ? 'text-rose-700 dark:text-rose-300/90' : 'text-zinc-400'"
            >
              Article Text
            </label
          >
          <textarea
            name="text"
            id="text-input"
            rows="6"
            required
            class="w-full p-4 bg-zinc-50 dark:bg-zinc-950 border border-zinc-100 dark:border-zinc-800 rounded-2xl focus:ring-1 focus:ring-black dark:focus:ring-zinc-400 outline-none text-sm"
          ></textarea>
        </div>

        <div>
          <label
            for="custom_instruction_input"
            class="block text-[10px] font-bold uppercase tracking-widest text-zinc-400 mb-2"
            >Custom Instructions for the AI (Optional) </label
          >
          <textarea
            name="custom_instruction"
            id="custom_instruction_input"
            rows="6"
            class="w-full p-4 bg-zinc-50 dark:bg-zinc-950 border border-zinc-100 dark:border-zinc-800 rounded-2xl focus:ring-1 focus:ring-black dark:focus:ring-zinc-400 outline-none text-sm"
            placeholder="For example: Always make at least one reference to Australian culture"
          ></textarea>
        </div>

				<div class="relative" x-data="{ open: false, selected: 'Instagram' }">
          <label for="social-media-picker" class="block text-[10px] font-bold uppercase tracking-widest text-zinc-400 mb-2">
            Target Social Media Platform
          </label>
          
          <button 
            id="social-media-picker"
            @click="open = !open"
            type="button"
            class="w-full flex items-center justify-between p-4 bg-zinc-50 dark:bg-zinc-950 border border-zinc-100 dark:border-zinc-800 rounded-2xl text-sm focus:ring-1 focus:ring-black dark:focus:ring-zinc-400"
          >
            <span x-text="selected"></span>
            <svg class="h-4 w-4 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
            </svg>
          </button>

          <div 
            x-show="open" 
            @click.away="open = false"
            class="absolute z-10 mt-2 w-full bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-700 rounded-2xl shadow-xl overflow-hidden"
          >
            {% for platform in SocialMediaPlatform %}
            <div 
              @click="selected = '{{ platform.value }}'; open = false"
              class="px-4 py-3 text-sm cursor-pointer hover:bg-zinc-50 dark:hover:bg-zinc-800 border-b border-zinc-100 dark:border-zinc-800 last:border-none transition-colors"
            >
              {{ platform.value }}
            </div>
            {% endfor %}
          </div>
          
          <input type="hidden" name="social_media_platform" :value="selected">
        </div>

        <fieldset class="space-y-2">
          <legend class="block text-[10px] font-bold uppercase tracking-widest text-zinc-400 mb-2">
            Desired Caption Length
          </legend>
          
          <div class="grid grid-cols-3 gap-2">
            {% for style in CaptionStyle %}
            <label class="group">
              <input
                type="radio"
                name="caption_style"
                id="style-{{ style.name }}"
                value="{{ style.name }}"
                class="hidden peer"
                {% if style.name is sameas "MEDIUM" %}checked{% endif %}
              />
              <div class="text-center py-3 border border-zinc-100 dark:border-zinc-800 rounded-xl peer-checked:bg-black dark:peer-checked:bg-white peer-checked:text-white dark:peer-checked:text-zinc-900 peer-checked:border-black dark:peer-checked:border-white text-[11px] font-bold uppercase tracking-tighter cursor-pointer">
                {{ style.value.label }}
              </div>
            </label>
            {% endfor %}
          </div>
        </fieldset>

        <button
          type="submit"
          class="w-full bg-black dark:bg-zinc-200 text-white dark:text-zinc-900 py-4 rounded-2xl font-bold hover:bg-zinc-800 dark:hover:bg-white flex items-center justify-center gap-3"
        >
          <span>GENERATE</span>
          <div
            class="htmx-indicator animate-spin h-4 w-4 border-2 border-white/20 dark:border-black/20 border-t-white dark:border-t-black rounded-full"
          ></div>
        </button>
      </form>

      <div
        id="output-window"
        class="min-h-[120px] bg-zinc-50 dark:bg-zinc-950 rounded-2xl p-5 border border-zinc-100 dark:border-zinc-800 relative"
      >
        <p class="text-zinc-400 dark:text-zinc-500 text-sm italic">Your caption will appear here...</p>
      </div>
    </div>

    <footer class="mt-8 pb-8 text-center space-y-2">
      <p class="text-[10px] font-bold uppercase tracking-[0.2em] text-zinc-400 dark:text-zinc-500">
        &copy; 2026 Artisanal Systems. All rights reserved.
      </p>
      <p class="text-[9px] text-zinc-400/60 dark:text-zinc-500/40 italic">
        Software built from first principles.
      </p>
    </footer>

    <script>
      if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }

      function toggleDarkMode() {
        const isDark = document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
      }
      
      function copyToClipboard() {
        const text = document.getElementById("caption-text").innerText;
        navigator.clipboard.writeText(text).then(() => {
          const btn = document.getElementById("copy-btn");
          const original = btn.innerText;
          
          btn.innerText = "COPIED ✓";
          
          btn.classList.add(
            "bg-green-50", "dark:bg-green-900/30", 
            "border-green-200", "dark:border-green-800", 
            "text-green-700", "dark:text-green-400"
          );

          setTimeout(() => {
            btn.innerText = original;
            btn.classList.remove(
              "bg-green-50", "dark:bg-green-900/30", 
              "border-green-200", "dark:border-green-800", 
              "text-green-700", "dark:text-green-400"
            );
          }, 2000);
        });
      }
    </script>
  </body>
</html>
