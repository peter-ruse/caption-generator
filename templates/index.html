<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Caption Generator</title>
    <script>
      if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    </script>
    <script src="https://unpkg.com/htmx.org@2.0.0"></script>
    <script src="https://unpkg.com/htmx-ext-json-enc@2.0.1/json-enc.js"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/persist@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="/static/dist/main.css" rel="stylesheet">
    <link href="/static/assets/favicon.svg" rel="icon" type="svg+xml">
    <style>
      .htmx-indicator {
        display: none;
      }
      .htmx-request .htmx-indicator {
        display: inline-block;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      textarea::placeholder {
        font-style: italic;
        color: #a1a1aa;
      }
      html {
        color-scheme: light;
      }
      html.dark {
        color-scheme: dark;
      }
      textarea {
        scrollbar-color: rgba(161, 161, 170, 0.3) transparent;
      }
      textarea::-webkit-resizer {
        display: none !important;
        -webkit-appearance: none !important;
      }
      textarea::-webkit-scrollbar-track {
        background: transparent;
      }
    </style>
  </head>
  <body
    class="relative bg-zinc-50 dark:bg-zinc-950 min-h-screen flex flex-col items-center p-4 pt-16 font-sans text-zinc-900 dark:text-zinc-100"
  >
    <div class="absolute top-4 right-6 flex items-center space-x-2">
      <div class="flex flex-col items-end">
        <span class="text-[9px] font-bold uppercase tracking-[0.2em] text-zinc-400">Active User</span>
        <span class="text-xs font-mono text-zinc-600 dark:text-zinc-400">{{ username }}</span>
      </div>
      <div class="h-8 w-px bg-zinc-200 dark:border-zinc-800"></div>
    </div>
    
    <div
      class="w-full max-w-md bg-white dark:bg-zinc-900 rounded-3xl shadow-sm border border-zinc-200 dark:border-zinc-700 p-6 space-y-8"
    >
      <div class="flex flex-col items-center justify-center space-y-4 mb-8 w-full">
        <button 
          onclick="toggleDarkMode()" 
          class="p-2 rounded-full bg-inherit hover:scale-125 focus:outline-none"
          aria-label="Toggle Dark Mode"
        >
          <svg class="w-6 h-6 hidden dark:block text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
          </svg>
          <svg class="w-6 h-6 block dark:hidden text-zinc-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
          </svg>
        </button>

        <header class="text-center space-y-1">
          <h1 class="text-xl font-black tracking-tight uppercase">
            Caption Generator
          </h1>
          <div class="h-1 w-12 bg-black dark:bg-white mx-auto"></div>
        </header>
      </div>

      <form
        hx-post="/generate_caption"
        hx-ext="json-enc"
        hx-target="#output-window"
        hx-swap="innerHTML"
        class="space-y-6"
        novalidate
        hx-on::after-request="if(event.detail.successful) tried = false"
        x-data="{ 
          tried: false, 
          messages: {},
          updateMessage(id) {
            const el = document.getElementById(id);
            this.messages[id] = (this.tried && el && !el.validity.valid) ? el.validationMessage : '';
          }
        }"
        @submit="
          tried = true;
          ['title-input', 'link-input', 'text-input'].forEach(id => updateMessage(id));
          if (!$el.checkValidity()) { 
            $event.preventDefault();
            $el.querySelector(':invalid')?.focus();
            return false; 
          }
        "
      >
        <input type="hidden" name="provider" value="gemini" />
        <div x-data="{ val: $persist('').as('persist_title') }">
          <label 
            for="title-input" 
            class="block text-[10px] font-bold uppercase tracking-widest text-zinc-400 mb-2"
          >
            Article Title
          </label>
          <div x-show="messages['title-input']" x-cloak>
            <p class="text-[10px] text-rose-600 dark:text-rose-400 mb-2 italic" x-text="messages['title-input']"></p>
          </div>
          <input type="text" name="title" id="title-input" autocomplete="off" x-model="val" @input="updateMessage($el.id)" required
          class="w-full p-4 bg-zinc-50 dark:bg-zinc-950 border border-zinc-100 dark:border-zinc-800 rounded-2xl focus:ring-1 focus:ring-black dark:focus:ring-zinc-400 outline-none text-sm">
        </div>

        <div x-data="{ val: $persist('').as('persist_link') }">
          <label 
            for="link-input" 
            class="block text-[10px] font-bold uppercase tracking-widest text-zinc-400 mb-2"
          >
            Article Link
          </label>
          <div x-show="messages['link-input']" x-cloak>
            <p class="text-[10px] text-rose-600 dark:text-rose-400 mb-2 italic" x-text="messages['link-input']"></p>
          </div>
          <input type="url" name="link" id="link-input" autocomplete="off" x-model="val" @input="updateMessage($el.id)" required
          class="w-full p-4 bg-zinc-50 dark:bg-zinc-950 border border-zinc-100 dark:border-zinc-800 rounded-2xl focus:ring-1 focus:ring-black dark:focus:ring-zinc-400 outline-none text-sm">
        </div>

        <div x-data="{ val: $persist('').as('persist_article') }">
          <label
            for="text-input"
            class="block text-[10px] font-bold uppercase tracking-widest text-zinc-400 mb-2"
            >
              Article Text
            </label
          >
          <div x-show="messages['text-input']" x-cloak>
            <p class="text-[10px] text-rose-600 dark:text-rose-400 mb-2 italic" x-text="messages['text-input']"></p>
          </div>
          <textarea
            name="text"
            id="text-input"
            rows="6"
            @input="updateMessage($el.id)"
            required
            x-model="val"
            class="w-full p-4 bg-zinc-50 dark:bg-zinc-950 border border-zinc-100 dark:border-zinc-800 rounded-2xl focus:ring-1 focus:ring-black dark:focus:ring-zinc-400 outline-none text-sm"
          ></textarea>
        </div>

        <div x-data="{ val: $persist('').as('persist_custom_instruction') }">
          <label
            for="custom_instruction_input"
            class="block text-[10px] font-bold uppercase tracking-widest text-zinc-400 mb-2"
            >Custom Instructions for the AI (Optional) </label
          >
          <textarea
            name="custom_instruction"
            id="custom_instruction_input"
            rows="6"
            class="w-full p-4 bg-zinc-50 dark:bg-zinc-950 border border-zinc-100 dark:border-zinc-800 rounded-2xl focus:ring-1 focus:ring-black dark:focus:ring-zinc-400 outline-none text-sm"
            x-model="val"
            placeholder="For example: Make at least one reference to Australian culture"
          ></textarea>
        </div>

				<div class="relative" x-data="{ open: false, selected: $persist('Instagram').as('persist_social_media_platform') }">
          <label for="social-media-picker" class="block text-[10px] font-bold uppercase tracking-widest text-zinc-400 mb-2">
            Target Social Media Platform
          </label>
          
          <button 
            id="social-media-picker"
            @click="open = !open"
            type="button"
            class="w-full flex items-center justify-between p-4 bg-zinc-50 dark:bg-zinc-950 border border-zinc-100 dark:border-zinc-800 rounded-2xl text-sm focus:ring-1 focus:ring-black dark:focus:ring-zinc-400"
          >
            <span x-text="selected"></span>
            <svg class="h-4 w-4 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
            </svg>
          </button>

          <div 
            x-show="open" 
            @click.away="open = false"
            x-transition:enter="transition ease-out duration-200"
            x-transition:enter-start="opacity-0 scale-95"
            x-transition:enter-end="opacity-100 scale-100"
            x-transition:leave="transition ease-in duration-100"
            x-transition:leave-start="opacity-100 scale-100"
            x-transition:leave-end="opacity-0 scale-95"
            class="absolute z-10 mt-2 w-full bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-2xl shadow-2xl dark:shadow-[0_0_25px_rgba(0,0,0,0.8)] overflow-hidden"
          >
            {% for platform in SocialMediaPlatform %}
            <div 
              @click="selected = '{{ platform.value }}'; open = false"
              class="px-4 py-3 text-sm cursor-pointer hover:bg-zinc-50 dark:hover:bg-zinc-700 border-b border-zinc-100 dark:border-zinc-700/50 last:border-none transition-colors dark:hover:text-white"
            >
              {{ platform.value }}
            </div>
            {% endfor %}
          </div>
          
          <input type="hidden" name="social_media_platform" :value="selected">
        </div>

        <fieldset class="space-y-2" x-data="{ style: $persist('MEDIUM').as('persist_caption_length') }">
          <legend class="block text-[10px] font-bold uppercase tracking-widest text-zinc-400 mb-2">
            Desired Caption Length
          </legend>
          
          <div class="grid grid-cols-3 gap-2">
            {% for style in CaptionStyle %}
            <label class="group">
              <input
                type="radio"
                name="caption_style"
                id="style-{{ style.name }}"
                value="{{ style.name }}"
                x-model="style"
                class="hidden peer"
              />
              <div class="text-center py-3 border border-zinc-100 dark:border-zinc-800 rounded-xl peer-checked:bg-black dark:peer-checked:bg-white peer-checked:text-white dark:peer-checked:text-zinc-900 peer-checked:border-black dark:peer-checked:border-white text-[11px] font-bold uppercase tracking-tighter cursor-pointer">
                {{ style.value.label }}
              </div>
            </label>
            {% endfor %}
          </div>
        </fieldset>

        <button
          type="submit"
          class="w-full bg-black dark:bg-zinc-200 text-white dark:text-zinc-900 py-4 rounded-2xl font-bold hover:bg-zinc-800 dark:hover:bg-white flex items-center justify-center gap-3"
        >
          <span>GENERATE</span>
          <div
            class="htmx-indicator animate-spin h-4 w-4 border-2 border-white/20 dark:border-black/20 border-t-white dark:border-t-black rounded-full"
          ></div>
        </button>
      </form>

      <div id="output-window" class="px-4"></div>
    </div>

    <footer class="mt-8 pb-8 text-center space-y-2">
      <p class="text-[10px] font-bold uppercase tracking-[0.2em] text-zinc-400 dark:text-zinc-500">
        &copy; 2026 Artisanal Systems. All rights reserved.
      </p>
      
      <p class="flex items-center justify-center text-[9px] text-zinc-400/60 dark:text-zinc-500/40 italic">
        <img src="/static/assets/favicon.svg" 
            alt="" 
            style="height: 20px; width: 20px; margin-right: 6px;" 
        />
        <span>Software built from first principles.</span>
      </p>
    </footer>

    <script>
      function toggleDarkMode() {
        const isDark = document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
      }
      
      async function copyToClipboard() {
          const captionTextElement = document.getElementById("caption-text");
          const button = document.getElementById("copy-btn");

          if (!captionTextElement || !button) {
            return;
          }

          const text = captionTextElement.innerText;
          const original = button.innerText;
          let copied = false;

          try {
            if (navigator.clipboard && window.isSecureContext) {
              await navigator.clipboard.writeText(text);
              copied = true;
            } else {
              const textArea = document.createElement("textarea");
              textArea.value = text;
              textArea.setAttribute("readonly", "");
              textArea.style.position = "absolute";
              textArea.style.left = "-9999px";
              document.body.appendChild(textArea);
              textArea.select();
              copied = document.execCommand("copy");
              document.body.removeChild(textArea);
            }
          } catch (_err) {
            copied = false;
          }

          if (!copied) {
            return;
          }

          button.classList.remove(
            "text-black", "dark:text-zinc-100",
            "border-black", "dark:border-zinc-500",
            "hover:bg-zinc-50", "dark:hover:bg-zinc-800"
          );

          button.innerText = "COPIED ✓";

          button.classList.add(
            "bg-green-50", "dark:bg-green-900/30",
            "border-green-200", "dark:border-green-800",
            "text-green-700", "dark:text-green-400"
          );

          setTimeout(() => {
            button.innerText = original;
            button.classList.remove(
              "bg-green-50", "dark:bg-green-900/30",
              "border-green-200", "dark:border-green-800",
              "text-green-700", "dark:text-green-400"
            );

            button.classList.add(
              "text-black", "dark:text-zinc-100",
              "border-black", "dark:border-zinc-500",
              "hover:bg-zinc-50", "dark:hover:bg-zinc-800"
            );
          }, 2000);
      }

      function toggleTag(button) {
        const baseTemplate = document.getElementById("base-template");
        const baseCaption = baseTemplate.textContent;

        button.classList.toggle('bg-black');
        button.classList.toggle('text-white');
        button.classList.toggle('dark:bg-white');
        button.classList.toggle('dark:text-zinc-900');
        button.classList.toggle('is-selected');

        const selectedTags = Array.from(document.querySelectorAll('.tag-btn.is-selected')).map(button => button.getAttribute('data-tag'));
        
        const display = document.getElementById('caption-text');
        
        display.innerText = selectedTags.length > 0 
          ? `${baseCaption}\n\n${selectedTags.join(' ')}` 
          : baseCaption;
      }

      function copyFullCaption() {
        const text = document.getElementById('caption-text').innerText;
        navigator.clipboard.writeText(text);
      }

      (function() {
          const sessionExpiry = {{ session_expiry | tojson }}; 

          if (sessionExpiry) {
              const timeout = (sessionExpiry * 1000) - Date.now();

              if (timeout > 0) {
                  setTimeout(() => {
                      window.location.href = '/login?reason=session_expired';
                  }, timeout);
              } else {
                  window.location.href = '/login';
              }
          }
      })();

      document.body.addEventListener('htmx:responseError', function(event) {
          if (event.detail.xhr.status === 401) {
              window.location.href = '/login?reason=unauthorized';
          }
      });
    </script>
  </body>
</html>
